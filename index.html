<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance Checklist</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    textarea { resize: none; }
    .collapse-enter { max-height: 0; overflow: hidden; }
    .collapse-open { max-height: 9999px; overflow: visible; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    /* Dark mode transitions */
    * { transition: background-color 0.2s ease, color 0.2s ease; }
    .dark-card { background-color: #1f2937; color: #f9fafb; }
    .dark-input { background-color: #374151; color: #f9fafb; border-color: #4b5563; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  /* ================================================================
     CONSTANTS
  ================================================================ */
  const FILTER_SIZES = ['24x30x1', '24x24x1', '20x20x1', '16x25x1'];
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  /* ================================================================
     DATA INITIALIZATION
  ================================================================ */
  function generateInitialUnits() {
    const units = [];
    let id = 1;

    // Floor 5: units 501–506 (6 units)
    for (let u = 1; u <= 6; u++) {
      units.push({
        id: id++,
        unit_number: `5${String(u).padStart(2,'0')}`,
        section: 'Floor 5',
        filter_size: FILTER_SIZES[(u - 1) % FILTER_SIZES.length],
        is_active: true,
      });
    }

    // Floors 6–18: 5 units each (e.g. 601–605, 1001–1005)
    for (let floor = 6; floor <= 18; floor++) {
      for (let u = 1; u <= 5; u++) {
        units.push({
          id: id++,
          unit_number: `${floor}${String(u).padStart(2,'0')}`,
          section: `Floor ${floor}`,
          filter_size: FILTER_SIZES[(u - 1) % FILTER_SIZES.length],
          is_active: true,
        });
      }
    }

    // Penthouse PH1–PH4
    for (let p = 1; p <= 4; p++) {
      units.push({
        id: id++,
        unit_number: `PH${p}`,
        section: 'Penthouse',
        filter_size: '24x30x1',
        is_active: true,
      });
    }

    // Townhouse TH-1–TH-4
    for (let t = 1; t <= 4; t++) {
      units.push({
        id: id++,
        unit_number: `TH-${t}`,
        section: 'Townhouse',
        filter_size: '20x20x1',
        is_active: true,
      });
    }

    return units;
  }

  /* ================================================================
     HOOKS
  ================================================================ */
  function useLocalStorage(key, initialValue) {
    const [storedValue, setStoredValue] = useState(() => {
      try {
        const item = window.localStorage.getItem(key);
        return item ? JSON.parse(item) : (typeof initialValue === 'function' ? initialValue() : initialValue);
      } catch {
        return typeof initialValue === 'function' ? initialValue() : initialValue;
      }
    });

    const setValue = useCallback((value) => {
      setStoredValue(prev => {
        const next = typeof value === 'function' ? value(prev) : value;
        try { window.localStorage.setItem(key, JSON.stringify(next)); } catch {}
        return next;
      });
    }, [key]);

    return [storedValue, setValue];
  }

  /* ================================================================
     UTILITIES
  ================================================================ */
  function getCurrentMonth() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`;
  }

  function formatMonth(m) {
    const [y, mo] = m.split('-');
    return `${MONTH_NAMES[parseInt(mo) - 1]} ${y}`;
  }

  function getAvailableMonths() {
    const list = [];
    const now = new Date();
    for (let i = 13; i >= -2; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      list.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`);
    }
    return list;
  }

  function sortSectionKeys(keys) {
    return [...keys].sort((a, b) => {
      const specials = ['Penthouse','Townhouse'];
      const ai = specials.indexOf(a), bi = specials.indexOf(b);
      if (ai >= 0 && bi >= 0) return ai - bi;
      if (ai >= 0) return 1;
      if (bi >= 0) return -1;
      return parseInt(a.replace('Floor ','')) - parseInt(b.replace('Floor ',''));
    });
  }

  /* ================================================================
     ICONS
  ================================================================ */
  function IconMenu() {
    return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>
    </svg>;
  }
  function IconX() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
    </svg>;
  }
  function IconChevronDown() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
    </svg>;
  }
  function IconChevronUp() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7"/>
    </svg>;
  }
  function IconCheck() {
    return <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/>
    </svg>;
  }
  function IconAlert() {
    return <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>;
  }
  function IconClipboard() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>;
  }
  function IconClock() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>;
  }
  function IconSettings() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>;
  }
  function IconMail() {
    return <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>;
  }
  function IconPlus() {
    return <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/>
    </svg>;
  }
  function IconEdit() {
    return <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
    </svg>;
  }
  function IconDownload() {
    return <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
    </svg>;
  }

  /* ================================================================
     SHARED COMPONENTS
  ================================================================ */

  function MonthSelector({ value, onChange }) {
    const months = useMemo(getAvailableMonths, []);
    return (
      <div className="flex items-center space-x-2">
        <label className="text-sm font-medium text-gray-500 whitespace-nowrap">Month:</label>
        <select
          value={value}
          onChange={e => onChange(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          {months.map(m => (
            <option key={m} value={m}>{formatMonth(m)}</option>
          ))}
        </select>
      </div>
    );
  }

  function ProgressBar({ completed, total }) {
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
    const barColor = pct === 100 ? 'bg-green-500' : pct >= 50 ? 'bg-yellow-400' : 'bg-blue-400';
    return (
      <div className="flex items-center space-x-2">
        <div className="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden min-w-0">
          <div className={`${barColor} h-2 rounded-full transition-all duration-500`} style={{ width: `${pct}%` }} />
        </div>
        <span className="text-xs text-gray-500 whitespace-nowrap tabular-nums">{completed}/{total}</span>
      </div>
    );
  }

  function StatCard({ value, label, colorClass, bgClass }) {
    return (
      <div className={`${bgClass} rounded-xl p-3 text-center`}>
        <div className={`text-2xl font-bold ${colorClass}`}>{value}</div>
        <div className="text-xs text-gray-500 mt-0.5">{label}</div>
      </div>
    );
  }

  /* ================================================================
     NAVIGATION
  ================================================================ */
  function Navigation({ currentPage, setCurrentPage, darkMode, toggleDark }) {
    const [open, setOpen] = useState(false);

    const NAV = [
      { id: 'checklist', label: 'Checklist',    Icon: IconClipboard },
      { id: 'history',   label: 'History',       Icon: IconClock     },
      { id: 'manage',    label: 'Manage Units',   Icon: IconSettings  },
      { id: 'reports',   label: 'Reports',        Icon: IconMail      },
    ];

    return (
      <nav className="bg-blue-700 text-white shadow-md sticky top-0 z-50">
        <div className="max-w-5xl mx-auto px-4">
          <div className="flex items-center justify-between h-14">
            <span className="font-bold text-lg tracking-tight">🔧 Maintenance</span>

            {/* Desktop */}
            <div className="hidden md:flex space-x-1">
              {NAV.map(({ id, label, Icon }) => (
                <button key={id} onClick={() => setCurrentPage(id)}
                  className={`flex items-center space-x-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
                    currentPage === id ? 'bg-blue-900' : 'text-blue-100 hover:bg-blue-600'
                  }`}>
                  <Icon /><span>{label}</span>
                </button>
              ))}
            </div>

            {/* Hamburger */}
            <button className="md:hidden p-2 rounded-lg hover:bg-blue-600 transition-colors"
              onClick={() => setOpen(o => !o)}>
              {open ? <IconX /> : <IconMenu />}
            </button>
            {/* Dark mode toggle */}
            <button
              onClick={toggleDark}
              className="p-2 rounded-lg hover:bg-blue-600 transition-colors ml-1"
              title={darkMode ? "Switch to Light Mode" : "Switch to Dark Mode"}
            >
              {darkMode ? "☀️" : "🌙"}
            </button>
          </div>
        </div>

        {/* Mobile menu */}
        {open && (
          <div className="md:hidden border-t border-blue-600 bg-blue-800">
            {NAV.map(({ id, label, Icon }) => (
              <button key={id} onClick={() => { setCurrentPage(id); setOpen(false); }}
                className={`w-full text-left flex items-center space-x-3 px-5 py-3.5 text-sm font-medium transition-colors ${
                  currentPage === id ? 'bg-blue-950 text-white' : 'text-blue-100 hover:bg-blue-700'
                }`}>
                <Icon /><span>{label}</span>
              </button>
            ))}
          </div>
        )}
      </nav>
    );
  }

  /* ================================================================
     UNIT ROW  (Checklist)
  ================================================================ */
  function UnitRow({ unit, check, onUpdate }) {
    const [notes, setNotes] = useState(check?.notes || '');
    const prevCheckRef = useRef(check);

    // Sync notes when switching months
    useEffect(() => {
      if (prevCheckRef.current?.unit_id !== check?.unit_id || prevCheckRef.current?.check_month !== check?.check_month) {
        setNotes(check?.notes || '');
        prevCheckRef.current = check;
      }
    }, [check]);

    const isChecked = check?.is_completed || false;
    const needsAttn = check?.needs_attention || false;

    const commit = (patch) => onUpdate(unit.id, patch);

    const toggleCheck = () => commit({
      is_completed: !isChecked,
      check_date: new Date().toISOString().split('T')[0],
      notes,
    });

    const toggleAttn = () => commit({ needs_attention: !needsAttn, notes });

    const saveNotes = () => {
      if (notes !== (check?.notes || '')) commit({ notes });
    };

    return (
      <div className={`flex items-start gap-3 px-4 py-3 border-b last:border-b-0 transition-colors ${
        isChecked ? 'bg-green-50' : needsAttn ? 'bg-amber-50' : 'bg-white'
      }`}>

        {/* Checkbox */}
        <button onClick={toggleCheck}
          className={`flex-shrink-0 mt-0.5 w-6 h-6 rounded border-2 flex items-center justify-center transition-colors ${
            isChecked ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 hover:border-green-400 bg-white'
          }`}>
          {isChecked && <IconCheck />}
        </button>

        {/* Content */}
        <div className="flex-1 min-w-0">
          <div className="flex flex-wrap items-center gap-2">
            <span className="font-semibold text-gray-800 text-sm">Unit {unit.unit_number}</span>
            <span className="text-xs bg-gray-100 text-gray-500 border border-gray-200 px-2 py-0.5 rounded-full font-mono">
              {unit.filter_size}
            </span>
            {check?.check_date && isChecked && (
              <span className="text-xs text-gray-400">{check.check_date}</span>
            )}
          </div>
          <textarea
            value={notes}
            onChange={e => setNotes(e.target.value)}
            onBlur={saveNotes}
            placeholder="Add notes…"
            rows={1}
            className="mt-1.5 w-full text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white bg-opacity-70 placeholder-gray-300"
          />
        </div>

        {/* Attention flag */}
        <button onClick={toggleAttn} title={needsAttn ? 'Clear flag' : 'Flag for attention'}
          className={`flex-shrink-0 mt-0.5 p-1.5 rounded-lg transition-colors ${
            needsAttn ? 'text-amber-500 bg-amber-100' : 'text-gray-300 hover:text-amber-400 hover:bg-amber-50'
          }`}>
          <IconAlert />
        </button>
      </div>
    );
  }

  /* ================================================================
     SECTION CARD  (Checklist)
  ================================================================ */
  function SectionCard({ section, units, checks, onUpdateCheck }) {
    const [open, setOpen] = useState(true);

    const total = units.length;
    const completed = units.filter(u => checks[u.id]?.is_completed).length;
    const flagged  = units.filter(u => checks[u.id]?.needs_attention).length;
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

    const allDone = pct === 100;
    const headerBg = allDone ? 'bg-green-50 border-green-200'
      : flagged > 0     ? 'bg-amber-50 border-amber-200'
                        : 'bg-white border-gray-200';

    const handleMarkAll = (val) => {
      units.forEach(u => onUpdateCheck(u.id, {
        is_completed: val,
        check_date: new Date().toISOString().split('T')[0],
      }));
    };

    return (
      <div className="border border-gray-200 rounded-xl shadow-sm overflow-hidden mb-3">
        {/* Header */}
        <div className={`${headerBg} border-b px-4 py-3`}>
          <div className="flex items-center gap-3">
            <button onClick={() => setOpen(o => !o)} className="flex-1 flex items-start gap-3 text-left">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-semibold text-gray-800">{section}</span>
                  {allDone && <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">✓ Complete</span>}
                  {flagged > 0 && (
                    <span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full flex items-center gap-1">
                      <IconAlert />{flagged} flagged
                    </span>
                  )}
                </div>
                <div className="mt-1.5 max-w-xs">
                  <ProgressBar completed={completed} total={total} />
                </div>
              </div>
              <span className="text-gray-400 mt-0.5 flex-shrink-0">{open ? <IconChevronUp /> : <IconChevronDown />}</span>
            </button>
          </div>

          {/* Quick actions */}
          {open && (
            <div className="flex gap-2 mt-2">
              <button onClick={() => handleMarkAll(true)}
                className="text-xs text-green-700 bg-green-100 hover:bg-green-200 px-2.5 py-1 rounded-lg transition-colors font-medium">
                Mark all done
              </button>
              <button onClick={() => handleMarkAll(false)}
                className="text-xs text-gray-600 bg-gray-100 hover:bg-gray-200 px-2.5 py-1 rounded-lg transition-colors font-medium">
                Clear all
              </button>
            </div>
          )}
        </div>

        {/* Units */}
        {open && units.map(unit => (
          <UnitRow
            key={unit.id}
            unit={unit}
            check={checks[unit.id]}
            onUpdate={onUpdateCheck}
          />
        ))}
      </div>
    );
  }

  /* ================================================================
     CHECKLIST PAGE
  ================================================================ */
  function ChecklistPage({ units, filterChecks, setFilterChecks, currentMonth, setCurrentMonth }) {
    const activeUnits = useMemo(() => units.filter(u => u.is_active), [units]);

    const sections = useMemo(() => {
      const map = {};
      activeUnits.forEach(u => {
        if (!map[u.section]) map[u.section] = [];
        map[u.section].push(u);
      });
      return map;
    }, [activeUnits]);

    const monthChecks = useMemo(() => {
      const map = {};
      filterChecks.filter(c => c.check_month === currentMonth).forEach(c => { map[c.unit_id] = c; });
      return map;
    }, [filterChecks, currentMonth]);

    const handleUpdateCheck = useCallback((unitId, updates) => {
      setFilterChecks(prev => {
        const idx = prev.findIndex(c => c.unit_id === unitId && c.check_month === currentMonth);
        if (idx >= 0) {
          const next = [...prev];
          next[idx] = { ...next[idx], ...updates };
          return next;
        }
        return [...prev, {
          id: Date.now() + Math.random(),
          unit_id: unitId,
          check_month: currentMonth,
          check_date: new Date().toISOString().split('T')[0],
          is_completed: false,
          needs_attention: false,
          notes: '',
          ...updates,
        }];
      });
    }, [currentMonth, setFilterChecks]);

    const totalUnits = activeUnits.length;
    const completedUnits = Object.values(monthChecks).filter(c => c.is_completed).length;
    const flaggedUnits  = Object.values(monthChecks).filter(c => c.needs_attention).length;
    const pct = totalUnits > 0 ? Math.round((completedUnits / totalUnits) * 100) : 0;

    const sortedSections = useMemo(() => sortSectionKeys(Object.keys(sections)), [sections]);

    return (
      <div className="max-w-3xl mx-auto px-4 py-5">
        {/* Header card */}
        <div className="bg-white rounded-2xl shadow-sm p-5 mb-5">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div>
              <h1 className="text-xl font-bold text-gray-900">Filter Checks</h1>
              <p className="text-sm text-gray-400 mt-0.5">Tap a unit to mark it complete</p>
            </div>
            <MonthSelector value={currentMonth} onChange={setCurrentMonth} />
          </div>

          <div className="grid grid-cols-3 gap-3 mb-4">
            <StatCard value={totalUnits}     label="Total Units" colorClass="text-blue-600"  bgClass="bg-blue-50"  />
            <StatCard value={completedUnits} label="Completed"   colorClass="text-green-600" bgClass="bg-green-50" />
            <StatCard value={flaggedUnits}   label="Flagged"     colorClass="text-amber-600" bgClass="bg-amber-50" />
          </div>

          <div>
            <div className="flex justify-between text-xs text-gray-500 mb-1">
              <span className="font-medium">Overall Progress</span>
              <span className="font-bold text-gray-700">{pct}%</span>
            </div>
            <ProgressBar completed={completedUnits} total={totalUnits} />
          </div>
        </div>

        {/* Sections */}
        {sortedSections.map(sec => (
          <SectionCard
            key={sec}
            section={sec}
            units={sections[sec]}
            checks={monthChecks}
            onUpdateCheck={handleUpdateCheck}
          />
        ))}

        {sortedSections.length === 0 && (
          <div className="text-center py-16 text-gray-400">
            <IconClipboard />
            <p className="mt-2 text-sm">No active units. Add units in Manage Units.</p>
          </div>
        )}
      </div>
    );
  }

  /* ================================================================
     HISTORY PAGE
  ================================================================ */
  function HistoryPage({ units, filterChecks }) {
    const [month, setMonth] = useState(getCurrentMonth);
    const [secFilter, setSecFilter]    = useState('');
    const [statusFilter, setStatusFilter] = useState('');
    const [unitSearch, setUnitSearch]  = useState('');

    const allSections = useMemo(() => {
      const s = [...new Set(units.map(u => u.section))];
      return sortSectionKeys(s);
    }, [units]);

    const monthChecks = useMemo(() =>
      filterChecks.filter(c => c.check_month === month),
    [filterChecks, month]);

    const rows = useMemo(() => {
      let data = units.map(u => ({ unit: u, check: monthChecks.find(c => c.unit_id === u.id) }));

      if (secFilter)    data = data.filter(d => d.unit.section === secFilter);
      if (unitSearch)   data = data.filter(d => d.unit.unit_number.toLowerCase().includes(unitSearch.toLowerCase()));
      if (statusFilter === 'completed') data = data.filter(d => d.check?.is_completed);
      if (statusFilter === 'pending')   data = data.filter(d => !d.check?.is_completed);
      if (statusFilter === 'flagged')   data = data.filter(d => d.check?.needs_attention);

      return data;
    }, [units, monthChecks, secFilter, unitSearch, statusFilter]);

    const stats = useMemo(() => {
      const total     = units.filter(u => u.is_active).length;
      const completed = monthChecks.filter(c => c.is_completed).length;
      const flagged   = monthChecks.filter(c => c.needs_attention).length;
      return { total, completed, pending: total - completed, flagged };
    }, [units, monthChecks]);

    return (
      <div className="max-w-5xl mx-auto px-4 py-5">
        {/* Filters */}
        <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
          <h1 className="text-xl font-bold text-gray-900 mb-4">History</h1>

          <div className="flex flex-wrap gap-3 mb-4">
            <MonthSelector value={month} onChange={setMonth} />
            <div>
              <select value={secFilter} onChange={e => setSecFilter(e.target.value)}
                className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">All Sections</option>
                {allSections.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
                className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">All Status</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="flagged">Flagged</option>
              </select>
            </div>
            <input type="text" value={unitSearch} onChange={e => setUnitSearch(e.target.value)}
              placeholder="Search unit #"
              className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-28 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>

          <div className="grid grid-cols-4 gap-3">
            <StatCard value={stats.total}     label="Total"     colorClass="text-blue-600"  bgClass="bg-blue-50"  />
            <StatCard value={stats.completed} label="Completed" colorClass="text-green-600" bgClass="bg-green-50" />
            <StatCard value={stats.pending}   label="Pending"   colorClass="text-gray-600"  bgClass="bg-gray-100" />
            <StatCard value={stats.flagged}   label="Flagged"   colorClass="text-amber-600" bgClass="bg-amber-50" />
          </div>
        </div>

        {/* Table */}
        <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-200">
                <tr>
                  {['Unit','Section','Filter Size','Status','Date','Notes'].map(h => (
                    <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {rows.length === 0 ? (
                  <tr><td colSpan={6} className="px-4 py-12 text-center text-gray-400 text-sm">No records match your filters.</td></tr>
                ) : rows.map(({ unit, check }) => (
                  <tr key={unit.id} className={`hover:bg-gray-50 ${check?.needs_attention ? 'bg-amber-50' : ''}`}>
                    <td className="px-4 py-3 font-semibold text-gray-800">{unit.unit_number}</td>
                    <td className="px-4 py-3 text-gray-600">{unit.section}</td>
                    <td className="px-4 py-3 font-mono text-xs text-gray-500">{unit.filter_size}</td>
                    <td className="px-4 py-3">
                      <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${
                        check?.is_completed     ? 'bg-green-100 text-green-700' :
                        check?.needs_attention  ? 'bg-amber-100 text-amber-700' :
                                                  'bg-gray-100 text-gray-500'
                      }`}>
                        {check?.is_completed ? '✓ Done' : check?.needs_attention ? '⚠ Flagged' : '— Pending'}
                      </span>
                    </td>
                    <td className="px-4 py-3 text-xs text-gray-400">{check?.check_date || '—'}</td>
                    <td className="px-4 py-3 text-xs text-gray-500 max-w-xs truncate">{check?.notes || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  /* ================================================================
     MANAGE UNITS PAGE
  ================================================================ */
  function ManageUnitsPage({ units, setUnits }) {
    const [showAdd, setShowAdd] = useState(false);
    const [editId, setEditId]   = useState(null);
    const [editData, setEditData] = useState({});
    const [search, setSearch]   = useState('');
    const [newUnit, setNewUnit] = useState({ unit_number: '', section: 'Floor 5', filter_size: '24x30x1' });
    const [confirmDeact, setConfirmDeact] = useState(null);

    const sections = useMemo(() => {
      const defaults = [];
      for (let f = 5; f <= 18; f++) defaults.push(`Floor ${f}`);
      defaults.push('Penthouse', 'Townhouse');
      const extra = [...new Set(units.map(u => u.section))].filter(s => !defaults.includes(s));
      return [...defaults, ...extra];
    }, [units]);

    const filtered = useMemo(() => {
      const q = search.toLowerCase();
      return units.filter(u =>
        !q || u.unit_number.toLowerCase().includes(q) ||
        u.section.toLowerCase().includes(q) ||
        u.filter_size.toLowerCase().includes(q)
      );
    }, [units, search]);

    const addUnit = () => {
      if (!newUnit.unit_number.trim()) return;
      setUnits(prev => [...prev, {
        id: Date.now(),
        unit_number: newUnit.unit_number.trim().toUpperCase(),
        section: newUnit.section,
        filter_size: newUnit.filter_size,
        is_active: true,
      }]);
      setNewUnit({ unit_number: '', section: 'Floor 5', filter_size: '24x30x1' });
      setShowAdd(false);
    };

    const saveEdit = () => {
      setUnits(prev => prev.map(u => u.id === editId ? { ...u, ...editData } : u));
      setEditId(null);
    };

    const toggleActive = (id) => {
      setUnits(prev => prev.map(u => u.id === id ? { ...u, is_active: !u.is_active } : u));
      setConfirmDeact(null);
    };

    const activeCount = units.filter(u => u.is_active).length;

    return (
      <div className="max-w-4xl mx-auto px-4 py-5">
        {/* Header */}
        <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h1 className="text-xl font-bold text-gray-900">Manage Units</h1>
              <p className="text-sm text-gray-400">{activeCount} active · {units.length} total</p>
            </div>
            <button onClick={() => setShowAdd(s => !s)}
              className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">
              <IconPlus /><span>Add Unit</span>
            </button>
          </div>

          {/* Add form */}
          {showAdd && (
            <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl mb-4">
              <p className="text-sm font-semibold text-blue-800 mb-3">New Unit</p>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div>
                  <label className="text-xs text-gray-600 mb-1 block">Unit Number *</label>
                  <input type="text" value={newUnit.unit_number}
                    onChange={e => setNewUnit(p => ({ ...p, unit_number: e.target.value }))}
                    placeholder="e.g. 1906"
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                  <label className="text-xs text-gray-600 mb-1 block">Section</label>
                  <select value={newUnit.section}
                    onChange={e => setNewUnit(p => ({ ...p, section: e.target.value }))}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {sections.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-xs text-gray-600 mb-1 block">Filter Size</label>
                  <select value={newUnit.filter_size}
                    onChange={e => setNewUnit(p => ({ ...p, filter_size: e.target.value }))}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {FILTER_SIZES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div className="flex gap-2 mt-3">
                <button onClick={addUnit}
                  className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                  Add Unit
                </button>
                <button onClick={() => setShowAdd(false)}
                  className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm transition-colors">
                  Cancel
                </button>
              </div>
            </div>
          )}

          <input type="text" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search by unit #, section, or filter size…"
            className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        {/* Confirm modal */}
        {confirmDeact && (
          <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 px-4">
            <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl">
              <h3 className="font-bold text-gray-900 mb-2">
                {units.find(u => u.id === confirmDeact)?.is_active ? 'Deactivate' : 'Reactivate'} unit?
              </h3>
              <p className="text-sm text-gray-500 mb-4">
                Unit <strong>{units.find(u => u.id === confirmDeact)?.unit_number}</strong>{' '}
                will be {units.find(u => u.id === confirmDeact)?.is_active ? 'hidden from checklists' : 'restored to checklists'}.
              </p>
              <div className="flex gap-2">
                <button onClick={() => toggleActive(confirmDeact)}
                  className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-sm font-medium transition-colors">
                  Confirm
                </button>
                <button onClick={() => setConfirmDeact(null)}
                  className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-xl text-sm transition-colors">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Table */}
        <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b border-gray-200">
                <tr>
                  {['Unit #','Section','Filter Size','Status','Actions'].map(h => (
                    <th key={h} className={`px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider ${h === 'Actions' ? 'text-right' : 'text-left'}`}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {filtered.map(unit => (
                  <tr key={unit.id} className={`hover:bg-gray-50 ${!unit.is_active ? 'opacity-50' : ''}`}>
                    {editId === unit.id ? (
                      <>
                        <td className="px-4 py-2">
                          <input value={editData.unit_number}
                            onChange={e => setEditData(p => ({ ...p, unit_number: e.target.value }))}
                            className="border rounded-lg px-2 py-1 text-sm w-24 focus:outline-none focus:ring-1 focus:ring-blue-500" />
                        </td>
                        <td className="px-4 py-2">
                          <select value={editData.section}
                            onChange={e => setEditData(p => ({ ...p, section: e.target.value }))}
                            className="border rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                            {sections.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </td>
                        <td className="px-4 py-2">
                          <select value={editData.filter_size}
                            onChange={e => setEditData(p => ({ ...p, filter_size: e.target.value }))}
                            className="border rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                            {FILTER_SIZES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </td>
                        <td className="px-4 py-2" colSpan={2}>
                          <div className="flex gap-2">
                            <button onClick={saveEdit}
                              className="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-lg text-xs font-medium transition-colors">
                              Save
                            </button>
                            <button onClick={() => setEditId(null)}
                              className="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-xs transition-colors">
                              Cancel
                            </button>
                          </div>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="px-4 py-3 font-semibold text-gray-800">{unit.unit_number}</td>
                        <td className="px-4 py-3 text-gray-600">{unit.section}</td>
                        <td className="px-4 py-3 font-mono text-xs text-gray-500">{unit.filter_size}</td>
                        <td className="px-4 py-3">
                          <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                            unit.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'
                          }`}>
                            {unit.is_active ? 'Active' : 'Inactive'}
                          </span>
                        </td>
                        <td className="px-4 py-3">
                          <div className="flex justify-end gap-2">
                            <button onClick={() => { setEditId(unit.id); setEditData({ ...unit }); }}
                              className="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors" title="Edit">
                              <IconEdit />
                            </button>
                            <button onClick={() => setConfirmDeact(unit.id)}
                              className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-colors ${
                                unit.is_active
                                  ? 'text-gray-500 hover:bg-gray-100'
                                  : 'text-green-600 hover:bg-green-50'
                              }`}>
                              {unit.is_active ? 'Deactivate' : 'Reactivate'}
                            </button>
                          </div>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
                {filtered.length === 0 && (
                  <tr><td colSpan={5} className="px-4 py-10 text-center text-gray-400 text-sm">No units match your search.</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  /* ================================================================
     REPORTS PAGE
  ================================================================ */
  function ReportsPage({ units, filterChecks }) {
    const [month, setMonth] = useState(getCurrentMonth);
    const [sender, setSender] = useState('');
    const [recipients, setRecipients] = useState(['']);
    const [emailStatus, setEmailStatus] = useState(null);

    const activeUnits = useMemo(() => units.filter(u => u.is_active), [units]);

    const monthChecks = useMemo(() =>
      filterChecks.filter(c => c.check_month === month),
    [filterChecks, month]);

    const stats = useMemo(() => {
      const total      = activeUnits.length;
      const completed  = monthChecks.filter(c => c.is_completed).length;
      const flagged    = monthChecks.filter(c => c.needs_attention).length;
      const pending    = total - completed;
      const rate       = total > 0 ? Math.round((completed / total) * 100) : 0;

      const bySection = {};
      activeUnits.forEach(u => {
        if (!bySection[u.section]) bySection[u.section] = { total: 0, completed: 0, flagged: 0 };
        bySection[u.section].total++;
        const c = monthChecks.find(x => x.unit_id === u.id);
        if (c?.is_completed)    bySection[u.section].completed++;
        if (c?.needs_attention) bySection[u.section].flagged++;
      });

      const flaggedItems = monthChecks
        .filter(c => c.needs_attention)
        .map(c => ({ unit: units.find(u => u.id === c.unit_id), check: c }))
        .filter(x => x.unit);

      return { total, completed, flagged, pending, rate, bySection, flaggedItems };
    }, [activeUnits, monthChecks, units]);

    // ---------- Report generation ----------

    const buildCSV = () => {
      const lines = [
        `Maintenance Report — ${formatMonth(month)}`,
        `Generated,${new Date().toLocaleDateString()}`,
        ``,
        `Summary`,
        `Total Units,${stats.total}`,
        `Completed,${stats.completed}`,
        `Pending,${stats.pending}`,
        `Flagged,${stats.flagged}`,
        `Completion Rate,${stats.rate}%`,
        ``,
        `Unit Details`,
        `Unit #,Section,Filter Size,Status,Date Checked,Needs Attention,Notes`,
        ...activeUnits.map(u => {
          const c = monthChecks.find(x => x.unit_id === u.id);
          return [
            u.unit_number,
            u.section,
            u.filter_size,
            c?.is_completed ? 'Completed' : 'Pending',
            c?.check_date || '',
            c?.needs_attention ? 'Yes' : 'No',
            `"${(c?.notes || '').replace(/"/g, '""')}"`,
          ].join(',');
        }),
      ];
      return lines.join('\n');
    };

    const buildHTML = () => {
      const sectionRows = sortSectionKeys(Object.keys(stats.bySection)).map(sec => {
        const d = stats.bySection[sec];
        const r = d.total > 0 ? Math.round((d.completed / d.total) * 100) : 0;
        return `<tr>
          <td>${sec}</td><td>${d.total}</td><td>${d.completed}</td>
          <td>${d.total - d.completed}</td><td>${d.flagged}</td>
          <td><div style="background:#e5e7eb;border-radius:4px;height:8px;width:100%;overflow:hidden">
            <div style="width:${r}%;background:${r===100?'#10b981':'#3b82f6'};height:8px"></div></div>
            <span style="font-size:11px;color:#6b7280">${r}%</span></td>
        </tr>`;
      }).join('');

      const unitRows = activeUnits.map(u => {
        const c = monthChecks.find(x => x.unit_id === u.id);
        const done = c?.is_completed;
        const flag = c?.needs_attention;
        return `<tr style="background:${flag?'#fffbeb':done?'#f0fdf4':'white'}">
          <td><strong>${u.unit_number}</strong></td>
          <td>${u.section}</td>
          <td style="font-family:monospace;font-size:12px">${u.filter_size}</td>
          <td><span style="padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:${done?'#d1fae5':flag?'#fef3c7':'#f3f4f6'};color:${done?'#065f46':flag?'#92400e':'#6b7280'}">
            ${done ? '✓ Done' : flag ? '⚠ Flagged' : '— Pending'}</span></td>
          <td style="color:#9ca3af;font-size:12px">${c?.check_date||'—'}</td>
          <td style="color:#6b7280;font-size:12px">${c?.notes||'—'}</td>
        </tr>`;
      }).join('');

      const flaggedSection = stats.flaggedItems.length > 0 ? `
        <h2 style="margin-top:32px">⚠️ Items Needing Attention (${stats.flaggedItems.length})</h2>
        <table style="width:100%;border-collapse:collapse;margin-top:8px">
          <thead><tr style="background:#f3f4f6">
            <th style="${thStyle}">Unit</th><th style="${thStyle}">Section</th>
            <th style="${thStyle}">Filter</th><th style="${thStyle}">Date</th><th style="${thStyle}">Notes</th>
          </tr></thead>
          <tbody>${stats.flaggedItems.map(({unit:u,check:c})=>`<tr>
            <td style="${tdStyle}"><strong>${u.unit_number}</strong></td>
            <td style="${tdStyle}">${u.section}</td>
            <td style="${tdStyle};font-family:monospace;font-size:12px">${u.filter_size}</td>
            <td style="${tdStyle};color:#9ca3af">${c.check_date||'—'}</td>
            <td style="${tdStyle};color:#6b7280">${c.notes||'—'}</td>
          </tr>`).join('')}</tbody>
        </table>` : `<p style="color:#059669;font-weight:600;margin-top:24px">✅ No items flagged for attention this month.</p>`;

      const thStyle = `text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;color:#6b7280;font-weight:600`;
      const tdStyle = `padding:8px 12px;border-bottom:1px solid #e5e7eb`;

      return `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>Maintenance Report — ${formatMonth(month)}</title>
      <style>
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:900px;margin:0 auto;padding:32px;color:#111827}
        h1{color:#1d4ed8;border-bottom:3px solid #1d4ed8;padding-bottom:12px;margin-bottom:4px}
        h2{color:#374151;margin-top:28px;font-size:18px}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;color:#6b7280;font-weight:600;background:#f9fafb}
        td{padding:8px 12px;border-bottom:1px solid #e5e7eb}
        tr:hover td{background:#f9fafb}
        .stat{display:inline-block;min-width:100px;background:#f3f4f6;border-radius:12px;padding:16px;text-align:center;margin-right:12px;margin-bottom:12px}
        .stat-val{font-size:32px;font-weight:800}
        .stat-lbl{font-size:12px;color:#6b7280;margin-top:2px}
        footer{margin-top:40px;padding-top:16px;border-top:1px solid #e5e7eb;font-size:12px;color:#9ca3af}
      </style></head><body>
      <h1>🔧 Maintenance Report</h1>
      <p style="color:#6b7280;margin-top:4px">${formatMonth(month)} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      <div style="margin:24px 0">
        <div class="stat"><div class="stat-val" style="color:#1d4ed8">${stats.total}</div><div class="stat-lbl">Total Units</div></div>
        <div class="stat"><div class="stat-val" style="color:#059669">${stats.completed}</div><div class="stat-lbl">Completed</div></div>
        <div class="stat"><div class="stat-val" style="color:#6b7280">${stats.pending}</div><div class="stat-lbl">Pending</div></div>
        <div class="stat"><div class="stat-val" style="color:#d97706">${stats.flagged}</div><div class="stat-lbl">Flagged</div></div>
        <div class="stat"><div class="stat-val" style="color:${stats.rate===100?'#059669':'#1d4ed8'}">${stats.rate}%</div><div class="stat-lbl">Completion</div></div>
      </div>
      <h2>Section Breakdown</h2>
      <table><thead><tr>
        <th>Section</th><th>Total</th><th>Done</th><th>Pending</th><th>Flagged</th><th>Progress</th>
      </tr></thead><tbody>${sectionRows}</tbody></table>
      <h2>All Units</h2>
      <table><thead><tr>
        <th>Unit</th><th>Section</th><th>Filter Size</th><th>Status</th><th>Date</th><th>Notes</th>
      </tr></thead><tbody>${unitRows}</tbody></table>
      ${flaggedSection}
      <footer>Generated by Maintenance Checklist App</footer>
      </body></html>`;
    };

    const download = (content, filename, type) => {
      const blob = new Blob([content], { type });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    };

    const handleSend = () => {
      const valid = recipients.filter(r => r.trim());
      if (!valid.length) { alert('Add at least one recipient email.'); return; }
      const sub  = encodeURIComponent(`Maintenance Report — ${formatMonth(month)}`);
      const body = encodeURIComponent(
        `Hi,\n\nPlease find attached the maintenance report for ${formatMonth(month)}.\n\n` +
        `SUMMARY\n` +
        `━━━━━━━━━━━━━━━━━━━━\n` +
        `Total Units:      ${stats.total}\n` +
        `Completed:        ${stats.completed} (${stats.rate}%)\n` +
        `Pending:          ${stats.pending}\n` +
        `Flagged:          ${stats.flagged}\n` +
        (stats.flaggedItems.length > 0
          ? `\nFlagged Units:\n${stats.flaggedItems.map(({unit:u}) => `  • Unit ${u.unit_number} (${u.section})`).join('\n')}\n`
          : '\n✅ No items flagged for attention.\n') +
        `\nSee attached file for full details.\n\n— Maintenance Team`
      );
      const mailto = `mailto:${valid.join(',')}?subject=${sub}&body=${body}`;
      window.location.href = mailto;
      setEmailStatus('Your email client has been opened. Please attach the downloaded report file before sending.');
    };

    return (
      <div className="max-w-3xl mx-auto px-4 py-5">
        {/* Summary card */}
        <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div>
              <h1 className="text-xl font-bold text-gray-900">Reports</h1>
              <p className="text-sm text-gray-400">Monthly summary &amp; email</p>
            </div>
            <MonthSelector value={month} onChange={setMonth} />
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
            <StatCard value={stats.total}     label="Total Units" colorClass="text-blue-600"  bgClass="bg-blue-50"  />
            <StatCard value={stats.completed} label="Completed"   colorClass="text-green-600" bgClass="bg-green-50" />
            <StatCard value={stats.pending}   label="Pending"     colorClass="text-gray-600"  bgClass="bg-gray-100" />
            <StatCard value={stats.flagged}   label="Flagged"     colorClass="text-amber-600" bgClass="bg-amber-50" />
          </div>

          {/* Completion rate */}
          <div className="mb-5">
            <div className="flex justify-between text-sm mb-1.5">
              <span className="font-medium text-gray-600">Completion Rate</span>
              <span className="font-bold text-gray-900">{stats.rate}%</span>
            </div>
            <ProgressBar completed={stats.completed} total={stats.total} />
          </div>

          {/* Section breakdown */}
          <h3 className="text-sm font-semibold text-gray-700 mb-2">By Section</h3>
          <div className="space-y-2">
            {sortSectionKeys(Object.keys(stats.bySection)).map(sec => {
              const d = stats.bySection[sec];
              return (
                <div key={sec} className="flex items-center gap-3">
                  <span className="text-xs text-gray-500 w-24 shrink-0 truncate">{sec}</span>
                  <div className="flex-1"><ProgressBar completed={d.completed} total={d.total} /></div>
                  {d.flagged > 0 && <span className="text-xs text-amber-500 shrink-0">⚠ {d.flagged}</span>}
                </div>
              );
            })}
          </div>

          {/* Flagged list */}
          {stats.flaggedItems.length > 0 && (
            <div className="mt-5 p-4 bg-amber-50 border border-amber-200 rounded-xl">
              <p className="text-sm font-semibold text-amber-800 mb-2">⚠️ Needs Attention ({stats.flaggedItems.length})</p>
              <div className="space-y-1.5">
                {stats.flaggedItems.map(({ unit: u, check: c }) => (
                  <div key={u.id} className="flex items-start gap-2 text-xs text-amber-700">
                    <span className="font-bold shrink-0">Unit {u.unit_number}</span>
                    <span className="text-amber-400">·</span>
                    <span className="shrink-0">{u.section}</span>
                    {c.notes && <span className="text-amber-600 italic truncate">— {c.notes}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Download buttons */}
          <div className="mt-5 flex flex-wrap gap-2">
            <button onClick={() => download(buildHTML(), `maintenance-report-${month}.html`, 'text/html')}
              className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-colors">
              <IconDownload /><span>Download HTML Report</span>
            </button>
            <button onClick={() => download(buildCSV(), `maintenance-report-${month}.csv`, 'text/csv')}
              className="flex items-center gap-2 bg-gray-600 hover:bg-gray-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-colors">
              <IconDownload /><span>Download CSV</span>
            </button>
          </div>
        </div>

        {/* Email card */}
        <div className="bg-white rounded-2xl shadow-sm p-5">
          <h2 className="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
            <IconMail /><span>Send via Email</span>
          </h2>

          {emailStatus && (
            <div className="mb-4 flex items-start gap-3 p-4 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-700">
              <span className="text-lg">✉️</span>
              <p>{emailStatus}</p>
            </div>
          )}

          <div className="mb-4">
            <label className="text-sm font-medium text-gray-700 block mb-1.5">From (Sender)</label>
            <input type="email" value={sender} onChange={e => setSender(e.target.value)}
              placeholder="maintenance@building.com"
              className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>

          <div className="mb-5">
            <div className="flex items-center justify-between mb-1.5">
              <label className="text-sm font-medium text-gray-700">To (Recipients)</label>
              <button onClick={() => setRecipients(p => [...p, ''])}
                className="flex items-center gap-1 text-xs text-blue-600 hover:text-blue-700 font-medium">
                <IconPlus /><span>Add recipient</span>
              </button>
            </div>
            <div className="space-y-2">
              {recipients.map((r, i) => (
                <div key={i} className="flex gap-2">
                  <input type="email" value={r}
                    onChange={e => setRecipients(p => p.map((x, j) => j === i ? e.target.value : x))}
                    placeholder="recipient@example.com"
                    className="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  {recipients.length > 1 && (
                    <button onClick={() => setRecipients(p => p.filter((_, j) => j !== i))}
                      className="p-2.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors">
                      <IconX />
                    </button>
                  )}
                </div>
              ))}
            </div>
          </div>

          <div className="mb-5 p-4 bg-gray-50 border border-gray-200 rounded-xl text-xs text-gray-500">
            <p className="font-semibold text-gray-600 mb-1.5">📎 To include an attachment:</p>
            <ol className="list-decimal list-inside space-y-1">
              <li>Download the HTML or CSV report above</li>
              <li>Click <strong>Open Email Client</strong> below</li>
              <li>Attach the downloaded file in your email app</li>
              <li>Review and send</li>
            </ol>
          </div>

          <button onClick={handleSend}
            className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold text-sm transition-colors">
            <IconMail /><span>Open Email Client</span>
          </button>
        </div>
      </div>
    );
  }

  /* ================================================================
     APP ROOT
  ================================================================ */
  function App() {
    const [units, setUnits]               = useLocalStorage('maint_units', generateInitialUnits);
    const [filterChecks, setFilterChecks] = useLocalStorage('maint_checks', []);
    const [page, setPage]                 = useState('checklist');
    const [month, setMonth]               = useState(getCurrentMonth);
    const [darkMode, setDarkMode]          = useLocalStorage('darkMode', false);

    return (
      <div className="`min-h-screen ${darkMode ? 'bg-gray-900 text-white' : 'bg-gray-100'}`">
        <Navigation currentPage={page} setCurrentPage={setPage} darkMode={darkMode} toggleDark={() => setDarkMode(!darkMode)} />
        <main className="pb-10">
          {page === 'checklist' && (
            <ChecklistPage
              units={units}
              filterChecks={filterChecks}
              setFilterChecks={setFilterChecks}
              currentMonth={month}
              setCurrentMonth={setMonth}
            />
          )}
          {page === 'history' && (
            <HistoryPage units={units} filterChecks={filterChecks} />
          )}
          {page === 'manage' && (
            <ManageUnitsPage units={units} setUnits={setUnits} />
          )}
          {page === 'reports' && (
            <ReportsPage units={units} filterChecks={filterChecks} />
          )}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
